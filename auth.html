<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ffffff">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="description" content="Sign in or sign up for Normativity.">
  <title>Sign In | Normativity</title>
  <link rel="canonical" href="https://normativity.org/auth.html">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Normativity">
  <meta property="og:title" content="Sign In | Normativity">
  <meta property="og:description" content="Account access page for Normativity.">
  <meta property="og:url" content="https://normativity.org/auth.html">
  <meta property="og:image" content="https://normativity.org/assets/Normativity%20Logo.png">
  <meta property="og:image:alt" content="Normativity logo">
  <link rel="icon" type="image/png" href="assets/Normativity%20Favicon.png">
  <link rel="stylesheet" href="auth.css">
  <link rel="stylesheet" href="theme.css">
  <script src="auth.js" defer></script>
  <script src="auth-page.js" defer></script>
</head>
<body class="auth-page forethought-site">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <main id="main-content" class="auth-shell" tabindex="-1">
    <section class="auth-card" aria-label="Account access">
      <div>
        <h1 class="auth-title">Normativity Account</h1>
        <p class="auth-subtitle">Create your profile or sign in to continue.</p>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Authentication modes">
        <button id="signinTab" type="button" class="auth-tab-btn" role="tab" aria-controls="signinPanel">Sign in</button>
        <button id="signupTab" type="button" class="auth-tab-btn" role="tab" aria-controls="signupPanel">Sign up</button>
      </div>

      <section id="signinPanel" class="auth-panel" role="tabpanel" aria-labelledby="signinTab">
        <label class="auth-field" for="signinIdentifier">
          Email or username
          <input id="signinIdentifier" type="text" autocomplete="username" placeholder="e.g., jasmine or jasmine@email.com">
        </label>
        <label class="auth-field" for="signinPassword">
          Password
          <input id="signinPassword" type="password" autocomplete="current-password">
        </label>
        <label class="auth-checkbox">
          <input id="signinAcceptTerms" type="checkbox">
          I agree to the Normativity commitment (required if your account has not accepted this version yet).
        </label>
        <div class="auth-actions">
          <button id="signinBtn" class="auth-btn" type="button">Sign in</button>
          <a class="auth-btn ghost" href="index.html">Back home</a>
        </div>
      </section>

      <section id="signupPanel" class="auth-panel" role="tabpanel" aria-labelledby="signupTab">
        <section class="signup-onboarding" aria-label="Profile setup">
          <div class="signup-onboarding-icon" aria-hidden="true">
            <span></span>
          </div>
          <h2 class="signup-onboarding-title">Tell us about yourself</h2>
          <p class="signup-onboarding-subtitle">Add your name, a profile picture, and a bit more about who you are.</p>
          <div class="signup-avatar-wrap">
            <div id="signupAvatarPreview" class="signup-avatar" aria-hidden="true">N</div>
            <button id="signupAvatarBtn" class="signup-avatar-edit" type="button" aria-label="Edit profile picture (coming soon)">✎</button>
          </div>
        </section>
        <label class="auth-field" for="signupDisplayName">
          Name <span class="field-required" aria-hidden="true">*</span>
          <input id="signupDisplayName" type="text" autocomplete="name" maxlength="80" placeholder="Ellen Sun">
        </label>
        <label class="auth-field" for="signupHandle">
          Username
          <input id="signupHandle" type="text" autocomplete="nickname" placeholder="jasmine">
        </label>
        <label class="auth-field" for="signupBio">
          Bio
          <textarea id="signupBio" rows="4" maxlength="400" placeholder="Say something about yourself..."></textarea>
        </label>
        <label class="auth-field" for="signupEmail">
          Email
          <input id="signupEmail" type="email" autocomplete="email">
        </label>
        <label class="auth-field" for="signupPassword">
          Password
          <input id="signupPassword" type="password" autocomplete="new-password">
        </label>
        <label class="auth-field" for="signupPasswordConfirm">
          Confirm password
          <input id="signupPasswordConfirm" type="password" autocomplete="new-password">
        </label>
        <label class="auth-checkbox">
          <input id="signupAcceptTerms" type="checkbox" required>
          I agree to the Normativity commitment.
        </label>
        <div class="auth-actions">
          <button id="signupBtn" class="auth-btn" type="button">Continue</button>
          <a class="auth-btn ghost" href="index.html">Back home</a>
        </div>
      </section>

      <p id="authStatus" class="auth-status" role="status" aria-live="polite"></p>

      <section class="auth-commitment" aria-label="User agreement">
        <h3>User Agreement</h3>
        <pre id="requiredAgreementText"></pre>
      </section>
    </section>
  </main>
</body>
</html>
