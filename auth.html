<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Sign in or sign up for Normativity.">
  <title>Sign In | Normativity</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="stylesheet" href="auth.css">
  <script src="auth.js" defer></script>
  <script src="auth-page.js" defer></script>
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card" aria-label="Account access">
      <div>
        <h1 class="auth-title">Normativity Account</h1>
        <p class="auth-subtitle">Create your profile or sign in to continue.</p>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Authentication modes">
        <button id="signinTab" type="button" class="auth-tab-btn" role="tab" aria-controls="signinPanel">Sign in</button>
        <button id="signupTab" type="button" class="auth-tab-btn" role="tab" aria-controls="signupPanel">Sign up</button>
      </div>

      <section id="signinPanel" class="auth-panel" role="tabpanel" aria-labelledby="signinTab">
        <label class="auth-field" for="signinIdentifier">
          Email or handle
          <input id="signinIdentifier" type="text" autocomplete="username" placeholder="e.g., jasmine or jasmine@email.com">
        </label>
        <label class="auth-field" for="signinPassword">
          Password
          <input id="signinPassword" type="password" autocomplete="current-password">
        </label>
        <label class="auth-checkbox">
          <input id="signinAcceptTerms" type="checkbox">
          I agree to the Normativity commitment (required if your account has not accepted this version yet).
        </label>
        <div class="auth-actions">
          <button id="signinBtn" class="auth-btn" type="button">Sign in</button>
          <a class="auth-btn ghost" href="index.html">Back home</a>
        </div>
      </section>

      <section id="signupPanel" class="auth-panel" role="tabpanel" aria-labelledby="signupTab">
        <label class="auth-field" for="signupHandle">
          Handle
          <input id="signupHandle" type="text" autocomplete="nickname" placeholder="letters, numbers, underscore">
        </label>
        <label class="auth-field" for="signupEmail">
          Email
          <input id="signupEmail" type="email" autocomplete="email">
        </label>
        <label class="auth-field" for="signupPassword">
          Password
          <input id="signupPassword" type="password" autocomplete="new-password">
        </label>
        <label class="auth-field" for="signupPasswordConfirm">
          Confirm password
          <input id="signupPasswordConfirm" type="password" autocomplete="new-password">
        </label>
        <label class="auth-checkbox">
          <input id="signupAcceptTerms" type="checkbox" required>
          I agree to the Normativity commitment.
        </label>
        <div class="auth-actions">
          <button id="signupBtn" class="auth-btn" type="button">Create account</button>
          <a class="auth-btn ghost" href="index.html">Back home</a>
        </div>
      </section>

      <p id="authStatus" class="auth-status" role="status" aria-live="polite"></p>

      <section class="auth-commitment" aria-label="Required commitment">
        <h3>Required Commitment</h3>
        <pre id="requiredAgreementText"></pre>
      </section>
    </section>
  </main>
</body>
</html>
