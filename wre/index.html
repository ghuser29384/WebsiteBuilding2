<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Normativity WRE Lessons</title>
  <link rel="stylesheet" href="/wre/styles.css" />
</head>
<body>
  <a class="skip-link" href="#wreApp">Skip to main content</a>
  <header class="wre-topbar">
    <div class="wre-shell">
      <a class="wre-home-link" href="/" aria-label="Return to home">← normativity.org</a>
      <h1 class="wre-title">Wide Reflective Equilibrium Lessons</h1>
      <div class="lesson-picker-wrap">
        <label for="lessonPicker">Lesson</label>
        <select id="lessonPicker" aria-label="Select lesson"></select>
      </div>
    </div>
  </header>

  <main class="wre-shell wre-main" id="wreApp" tabindex="-1">
    <section class="progress-card">
      <div class="progress-head">
        <p id="progressLabel">Step 1 / 1</p>
        <p id="progressTitle">Loading lesson...</p>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Lesson progress">
        <span id="progressFill"></span>
      </div>
    </section>

    <section class="workspace">
      <div class="workspace-left">
        <div id="lessonCardHost"></div>
      </div>
      <aside class="workspace-right">
        <div class="graph-card">
          <div class="graph-card-head">
            <h2>Reasoning Graph</h2>
            <button id="expandGraphBtn" class="btn btn-ghost" type="button">Expand graph</button>
          </div>
          <div id="graphHost"></div>
        </div>
        <div class="gauge-card">
          <h2>Coherence</h2>
          <div id="gaugeHost"></div>
        </div>
      </aside>
    </section>

    <section class="explanation-card">
      <h2>Explanation</h2>
      <div id="inspectorHost"></div>
    </section>
  </main>

  <script type="module" src="/wre/app.js"></script>
</body>
</html>
